app = "foundation-app"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    path = "/api/health"
    method = "GET"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
