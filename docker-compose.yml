services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SOLANA_RPC_URL=https://api.mainnet-beta.solana.com
        - NEXT_PUBLIC_SOLANA_NETWORK=mainnet-beta
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_SOLOMON_MINT=${NEXT_PUBLIC_SOLOMON_MINT}
        - NEXT_PUBLIC_SOLOMON_VAULT_PDA=${NEXT_PUBLIC_SOLOMON_VAULT_PDA}
        - NEXT_PUBLIC_SOLOMON_USDC_ATA=${NEXT_PUBLIC_SOLOMON_USDC_ATA}
        - NEXT_PUBLIC_KAMINO_MINT=${NEXT_PUBLIC_KAMINO_MINT}
        - NEXT_PUBLIC_KAMINO_VAULT_PDA=${NEXT_PUBLIC_KAMINO_VAULT_PDA}
        - NEXT_PUBLIC_KAMINO_USDC_ATA=${NEXT_PUBLIC_KAMINO_USDC_ATA}
        - NEXT_PUBLIC_DRIFT_MINT=${NEXT_PUBLIC_DRIFT_MINT}
        - NEXT_PUBLIC_DRIFT_VAULT_PDA=${NEXT_PUBLIC_DRIFT_VAULT_PDA}
        - NEXT_PUBLIC_DRIFT_USDC_ATA=${NEXT_PUBLIC_DRIFT_USDC_ATA}
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=8000
    restart: unless-stopped
