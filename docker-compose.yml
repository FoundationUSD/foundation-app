services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SOLANA_RPC_URL=${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
        - NEXT_PUBLIC_SOLANA_NETWORK=${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_VAULT_APOLLO_MINT=${NEXT_PUBLIC_VAULT_APOLLO_MINT}
        - NEXT_PUBLIC_VAULT_BUILD_MINT=${NEXT_PUBLIC_VAULT_BUILD_MINT}
        - NEXT_PUBLIC_VAULT_SCOPE_MINT=${NEXT_PUBLIC_VAULT_SCOPE_MINT}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VAULT_AUTHORITY_SECRET=${VAULT_AUTHORITY_SECRET}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    restart: unless-stopped
